name: Benchmark (s3-express one zone)

# We use environments to require approval to run benchmarks on PRs, but not on pushes to `main`
# (which have been approved already since PRs are required for `main`).
on:
  workflow_call:
    inputs:
      environment:
        type: string
      publish:
        type: boolean
        default: false
      ref:
        required: true
        type: string
      s3_bench_results_prefix:
        type: string

permissions:
  id-token: write
  contents: write # required to push to gh-pages

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  S3_BUCKET_NAME: ${{ vars.S3_EXPRESS_ONE_ZONE_BENCH_BUCKET_NAME }}
  S3_BUCKET_BENCH_FILE: ${{ vars.BENCH_FILE_NAME || 'bench100GB.bin' }}
  S3_BUCKET_SMALL_BENCH_FILE: ${{ vars.SMALL_BENCH_FILE_NAME || 'bench5MB.bin' }}
  # Optional endpoint url, can be empty
  S3_ENDPOINT_URL: ${{ vars.S3_EXPRESS_ONE_ZONE_BENCH_ENDPOINT_URL }}
  S3_REGION: ${{ vars.S3_BENCH_REGION }}
  MAX_VALUES_IN_BENCH_CHART: 30

jobs:
  approval:
    name: Approval Gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Approval Gate
        run: echo "Approved!"

  bench:
    name: Benchmark (Throughput${{ matrix.name_suffix }})
    runs-on: [self-hosted, linux, x64, nvme-high-performance]

    needs: approval

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            features: ""
            max_memory_target_mib: ""
            extra_args: ""
            bench_categories: ""
            name_suffix: ""
            data_path_suffix: ""
            results_subdir_suffix: ""
          - variant: mem-limited
            features: "--features mem_limiter"
            max_memory_target_mib: "512"
            extra_args: ""
            bench_categories: ""
            name_suffix: ", Memory-Limited"
            data_path_suffix: "/mem_limited"
            results_subdir_suffix: "-mem-limited"
          - variant: incremental-upload
            features: ""
            max_memory_target_mib: ""
            extra_args: "--incremental-upload"
            bench_categories: "write mix"
            name_suffix: ", Incremental Upload"
            data_path_suffix: "/incremental_upload"
            results_subdir_suffix: "-incremental-upload"
          - variant: incremental-upload-mem-limited
            features: "--features mem_limiter"
            max_memory_target_mib: "512"
            extra_args: "--incremental-upload"
            bench_categories: "write mix"
            name_suffix: ", Incremental Upload, Memory-Limited"
            data_path_suffix: "/incremental_upload/mem_limited"
            results_subdir_suffix: "-incremental-upload-mem-limited"

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.ACTIONS_BENCH_IAM_ROLE }}
        aws-region: ${{ vars.S3_BENCH_REGION }}
        role-duration-seconds: 21600
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: 2
        libunwind: true
        fio: true
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        # setup-rust-toolchain sets "-D warnings" by default, and Rust treats any warning as compile error.
        # We need to do this currently because `mountpoint-s3-fuser` contains some warnings and it breaks the build.
        rustflags: ""
    - name: Build
      run: cargo build --release ${{ matrix.features }}
    - name: Run Benchmark
      env:
        S3_MAX_MEMORY_TARGET_MIB: ${{ matrix.max_memory_target_mib }}
        S3_MOUNTPOINT_EXTRA_ARGS: ${{ matrix.extra_args }}
        S3_BENCH_CATEGORIES: ${{ matrix.bench_categories }}
        S3_BUCKET_TEST_PREFIX: ${{ vars.S3_BUCKET_BENCH_PREFIX || 'mountpoint-benchmark/' }}bench${{ matrix.results_subdir_suffix }}/
      run: mountpoint-s3/scripts/fs_bench.sh
    - name: Render memory summary
      if: matrix.max_memory_target_mib != ''
      run: .github/actions/scripts/render-mem-summary.sh
    - name: Save benchmark results in S3
      if: inputs.s3_bench_results_prefix
      run: .github/actions/scripts/save-benchmark-results.sh
      env:
        S3_BENCH_REGION: ${{ vars.S3_BENCH_REGION }}
        S3_BENCH_BUCKET_NAME: ${{ vars.S3_BENCH_RESULTS_BUCKET_NAME }}
        S3_BENCH_RESULTS_PREFIX: ${{ inputs.s3_bench_results_prefix }}/${{ github.job }}${{ matrix.results_subdir_suffix }}
        COMMIT_ID: ${{ inputs.ref }}
    - name: Check benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Throughput Benchmark (S3 Express One Zone${{ matrix.name_suffix }})
        tool: 'customBiggerIsBetter'
        output-file-path: results/output.json
        benchmark-data-dir-path: dev/s3-express/bench${{ matrix.data_path_suffix }}
        alert-threshold: "200%"
        fail-on-alert: false
        # GitHub API token to make a commit comment
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # Make sure to add this chart to the step provisioning static content and pushing the changes
        auto-push: false
        comment-on-alert: true
        max-items-in-chart: ${{ env.MAX_VALUES_IN_BENCH_CHART }}
        summary-always: true
    - name: Check resource utilization
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Throughput Benchmark - Peak Memory Usage (S3 Express One Zone${{ matrix.name_suffix }})
        tool: 'customSmallerIsBetter'
        output-file-path: results/peak_mem_usage.json
        benchmark-data-dir-path: dev/s3-express/bench${{ matrix.data_path_suffix }}/peak_mem_usage
        alert-threshold: "200%"
        fail-on-alert: false
        # GitHub API token to make a commit comment
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # Make sure to add this chart to the step provisioning static content and pushing the changes
        auto-push: false
        comment-on-alert: false
        max-items-in-chart: ${{ env.MAX_VALUES_IN_BENCH_CHART }}
        skip-fetch-gh-pages: true
        summary-always: true
    - name: Provision static content and push benchmark results
      # Store the results and deploy GitHub pages if the results are from main branch
      if: ${{ inputs.publish }}
      run: |
        .github/actions/scripts/copy-static-files.sh dev/s3-express/bench${{ matrix.data_path_suffix }} dev/s3-express/bench${{ matrix.data_path_suffix }}/peak_mem_usage
        git push 'https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git' gh-pages:gh-pages

  latency-bench:
    name: Benchmark (Latency)
    runs-on: [self-hosted, linux, x64, nvme-high-performance]

    needs: approval

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.ACTIONS_BENCH_IAM_ROLE }}
        aws-region: ${{ vars.S3_BENCH_REGION }}
        role-duration-seconds: 21600
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: 2
        libunwind: true
        fio: true
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        # setup-rust-toolchain sets "-D warnings" by default, and Rust treats any warning as compile error.
        # We need to do this currently because `mountpoint-s3-fuser` contains some warnings and it breaks the build.
        rustflags: ""
    - name: Build
      run: cargo build --release
    - name: Run Benchmark
      env:
        S3_BUCKET_TEST_PREFIX: ${{ vars.S3_BUCKET_BENCH_PREFIX || 'mountpoint-benchmark/' }}latency-bench/
      run: mountpoint-s3/scripts/fs_latency_bench.sh
    - name: Save benchmark results in S3
      if: inputs.s3_bench_results_prefix
      run: .github/actions/scripts/save-benchmark-results.sh
      env:
        S3_BENCH_REGION: ${{ vars.S3_BENCH_REGION }}
        S3_BENCH_BUCKET_NAME: ${{ vars.S3_BENCH_RESULTS_BUCKET_NAME }}
        S3_BENCH_RESULTS_PREFIX: ${{ inputs.s3_bench_results_prefix }}/${{ github.job }}
        COMMIT_ID: ${{ inputs.ref }}
    - name: Check benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Latency Benchmark (S3 Express One Zone)
        tool: 'customSmallerIsBetter'
        output-file-path: results/output.json
        benchmark-data-dir-path: dev/s3-express/latency_bench
        alert-threshold: "200%"
        fail-on-alert: false
        # GitHub API token to make a commit comment
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # Make sure to add this chart to the step provisioning static content and pushing the changes
        auto-push: false
        comment-on-alert: false
        max-items-in-chart: ${{ env.MAX_VALUES_IN_BENCH_CHART }}
        summary-always: true
    - name: Provision static content and push benchmark results
      # Store the results and deploy GitHub pages if the results are from main branch
      if: ${{ inputs.publish }}
      run: |
        .github/actions/scripts/copy-static-files.sh dev/s3-express/latency_bench
        git push 'https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git' gh-pages:gh-pages
